name: Soft Exam Daily System v2

# ⚠️ 必须加上这个权限设置，脚本才能提交代码！
permissions:
  contents: write

jobs:
  daily-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Content & Save File
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python daily_quiz.py

      # 新增步骤：把生成的 docs/data/xxx.json 提交回仓库
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # 添加新生成的文件
          git add docs/data/*.json
          # 如果有变化才提交，防止报错
          git commit -m "📅 Auto-add daily quiz data [skip ci]" || echo "No changes to commit"
          git push
